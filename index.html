<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0e14" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<title>Awesome Shelf</title>
<meta name="description" content="나중에 다시 보고 싶은 유용한 개발 리소스 개인 컬렉션" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%236aa6ff%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m16 6 4 14M12 6v14M8 8v12M4 4v16%22/></svg>" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --font: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
      "Apple SD Gothic Neo", "Malgun Gothic", Roboto, sans-serif;
    --sidebar-w: 256px;
    --r-sm: 8px; --r-md: 11px; --r-lg: 14px; --r-full: 999px;
    --t-fast: 120ms; --t: 200ms; --ease: cubic-bezier(.4, 0, .2, 1);

    /* dark (default) */
    --bg: #0b0e14;
    --sidebar-bg: #0d1119;
    --surface: #131823;
    --surface-2: #1a2130;
    --surface-hover: #1c2535;
    --border: #222a38;
    --border-strong: #313c4e;
    --text: #f3f6fb;
    --text-dim: #b6c0cf;
    --text-faint: #76818f;
    --accent: #6aa6ff;
    --accent-soft: #6aa6ff1f;
    --accent-contrast: #07101f;
    --ring: #6aa6ff55;
    --shadow-lg: 0 14px 44px -16px #000c;
  }
  :root[data-theme="light"] {
    --bg: #f7f9fc; --sidebar-bg: #ffffff; --surface: #ffffff; --surface-2: #f1f4f9; --surface-hover: #f5f8fc;
    --border: #e7ebf1; --border-strong: #d3dae3;
    --text: #11151c; --text-dim: #515c6b; --text-faint: #8a95a3;
    --accent: #2f6df6; --accent-soft: #2f6df612; --accent-contrast: #fff; --ring: #2f6df655;
    --shadow-lg: 0 16px 44px -22px #1f2a3a40;
  }
  @media (prefers-color-scheme: light) {
    :root[data-theme="auto"] {
      --bg: #f7f9fc; --sidebar-bg: #ffffff; --surface: #ffffff; --surface-2: #f1f4f9; --surface-hover: #f5f8fc;
      --border: #e7ebf1; --border-strong: #d3dae3;
      --text: #11151c; --text-dim: #515c6b; --text-faint: #8a95a3;
      --accent: #2f6df6; --accent-soft: #2f6df612; --accent-contrast: #fff; --ring: #2f6df655;
      --shadow-lg: 0 16px 44px -22px #1f2a3a40;
    }
  }
  .sec-awesome-list { --h: 262; } .sec-open-source { --h: 150; }
  .sec-ai-service   { --h: 200; } .sec-ai-project  { --h: 320; }
  .sec-prompt       { --h: 30;  } .sec-security    { --h: 4;   }
  .sec-article      { --h: 95;  } .sec-misc        { --h: 224; }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } * { transition: none !important; } }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.55;
    font-synthesis: none; -webkit-text-size-adjust: 100%; }
  a { color: inherit; text-decoration: none; }
  svg { stroke-linecap: round; stroke-linejoin: round; display: block; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }
  ::selection { background: var(--accent-soft); }

  /* ── App shell ─────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

  /* ── Sidebar ───────────────────────────────────────────────── */
  .sidebar { position: sticky; top: 0; height: 100vh; overflow-y: auto; overscroll-behavior: contain;
    background: var(--sidebar-bg); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px; padding: 18px 14px; z-index: 60; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 14px; font-weight: 800; font-size: 17px; letter-spacing: -.02em; }
  .brand .mark { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 9px;
    background: var(--accent-soft); color: var(--accent); flex-shrink: 0; }
  .brand .mark svg { width: 19px; height: 19px; }

  .nav-title { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; padding: 10px 10px 6px; }
  .navlist { display: flex; flex-direction: column; gap: 2px; }
  .navrow { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; cursor: pointer;
    background: none; border: 0; color: var(--text-dim); font: inherit; font-size: 13.5px; font-weight: 500;
    padding: 8px 10px; border-radius: var(--r-md); transition: background var(--t-fast), color var(--t-fast); }
  .navrow:hover { background: var(--surface-hover); color: var(--text); }
  .navrow .ic { width: 18px; height: 18px; flex-shrink: 0; color: hsl(var(--h, 220) 60% 62%); }
  .navrow .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .navrow .ct { font-size: 11.5px; font-weight: 600; color: var(--text-faint); background: var(--surface-2); padding: 1px 8px; border-radius: var(--r-full); }
  .navrow.active { background: hsl(var(--h, 220) 70% 55% / .14); color: hsl(var(--h, 220) 85% 74%); font-weight: 600; }
  .navrow.active .ct { background: hsl(var(--h, 220) 70% 55% / .22); color: hsl(var(--h, 220) 85% 80%); }

  .side-foot { margin-top: auto; padding-top: 14px; display: flex; align-items: center; gap: 8px; }
  .side-foot a, .side-foot button { display: grid; place-items: center; height: 36px; border-radius: var(--r-md);
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; transition: all var(--t-fast); }
  .side-foot a { flex: 1; gap: 7px; grid-auto-flow: column; font-size: 12.5px; font-weight: 600; }
  .side-foot button { width: 40px; }
  .side-foot a:hover, .side-foot button:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-hover); }
  .side-foot svg { width: 16px; height: 16px; }

  /* ── Main ──────────────────────────────────────────────────── */
  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(160%) blur(12px); -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-bottom: 1px solid var(--border); padding: 12px clamp(16px, 4vw, 40px); display: flex; align-items: center; gap: 12px; }
  .menu-btn { display: none; }
  .search { position: relative; flex: 1; max-width: 560px; }
  .search > svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-faint); pointer-events: none; }
  .search input { width: 100%; padding: 11px 80px 11px 42px; font: inherit; font-size: 15px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-full); transition: border-color var(--t), box-shadow var(--t); }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
  .search .kbd { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); }
  .search .kbd kbd { font: 600 11px var(--font); color: var(--text-faint); background: var(--surface-2);
    border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 6px; padding: 1px 7px; }
  .search .x { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: 0; background: var(--surface-2);
    color: var(--text-dim); width: 24px; height: 24px; border-radius: var(--r-full); cursor: pointer; display: none; place-items: center; }
  .search.has-value .x { display: grid; } .search.has-value .kbd { display: none; }

  .content { padding: clamp(20px, 4vw, 40px); padding-top: 28px; max-width: 1200px; width: 100%; margin: 0 auto; }

  /* ── Hero ──────────────────────────────────────────────────── */
  .hero { margin-bottom: 26px; }
  .hero h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 34px); font-weight: 800; letter-spacing: -.03em; }
  .hero p { margin: 0; color: var(--text-dim); font-size: 15px; max-width: 70ch; }
  .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .stat { font-size: 12.5px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: var(--r-full); }
  .stat b { color: var(--text); }

  /* ── Tag filter (collapsible, single row default) ──────────── */
  .filter { margin-bottom: 22px; border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--surface); }
  .filter > summary { list-style: none; cursor: pointer; padding: 12px 15px; display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 600; color: var(--text-dim); }
  .filter > summary::-webkit-details-marker { display: none; }
  .filter > summary svg { width: 16px; height: 16px; color: var(--text-faint); }
  .filter > summary .chev { margin-left: auto; transition: transform var(--t); }
  .filter[open] > summary .chev { transform: rotate(180deg); }
  .filter .body { padding: 2px 15px 15px; display: flex; flex-wrap: wrap; gap: 7px; }

  .chip { cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-dim);
    border-radius: var(--r-full); padding: 5px 12px; font-size: 13px; font-weight: 500; white-space: nowrap;
    transition: all var(--t-fast); display: inline-flex; align-items: center; gap: 6px; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); font-weight: 700; }
  .chip .cnt { font-size: 11px; opacity: .5; }

  .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; color: var(--text-dim); font-size: 13.5px; }
  .toolbar .count b { color: var(--text); }
  .btn-ghost { font: inherit; font-size: 13px; font-weight: 600; color: var(--text-dim); background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--r-full); padding: 5px 13px; cursor: pointer; }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-strong); }
  .active-tags { display: inline-flex; flex-wrap: wrap; gap: 6px; }

  /* ── Section + cards ───────────────────────────────────────── */
  .group { margin-bottom: 40px; scroll-margin-top: 84px; }
  .group-head { display: flex; align-items: center; gap: 11px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .group-head .ic { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 9px;
    background: hsl(var(--h, 220) 65% 55% / .14); color: hsl(var(--h, 220) 70% 64%); flex-shrink: 0; }
  .group-head .ic svg { width: 17px; height: 17px; }
  .group-head h2 { font-size: 18px; font-weight: 750; letter-spacing: -.02em; margin: 0; }
  .group-head .badge { font-size: 12px; font-weight: 700; color: var(--text-faint); }

  .cards { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
  .card { position: relative; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 15px 16px;
    background: var(--surface); display: flex; flex-direction: column; gap: 9px;
    transition: transform var(--t) var(--ease), border-color var(--t), box-shadow var(--t), background var(--t); }
  .card:hover { transform: translateY(-2px); border-color: hsl(var(--h, 220) 50% 50% / .55); box-shadow: var(--shadow-lg); background: var(--surface-hover); }
  /* 식별 이미지(아바타/파비콘) — 카드를 눈에 띄게 + 스캔 쉽게 */
  .chead { display: flex; align-items: center; gap: 10px; }
  .avatar { position: relative; width: 36px; height: 36px; border-radius: 9px; overflow: hidden; flex-shrink: 0;
    display: grid; place-items: center; background: hsl(var(--h, 220) 55% 50% / .16); }
  .avatar b { color: hsl(var(--h, 220) 68% 62%); font-weight: 800; font-size: 15px; text-transform: uppercase; }
  .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: var(--surface-2); }
  .ctitle { flex: 1; min-width: 0; display: flex; align-items: flex-start; gap: 5px; }
  .ctitle a { font-weight: 700; font-size: 14.5px; color: var(--text); letter-spacing: -.01em; word-break: break-word; line-height: 1.32; }
  .ctitle a:hover { color: var(--accent); }
  .ctitle a .owner { color: var(--text-faint); font-weight: 500; }
  .ctitle .ext { width: 13px; height: 13px; margin-top: 2px; color: var(--text-faint); flex-shrink: 0; opacity: 0; transition: opacity var(--t); }
  .card:hover .ctitle .ext { opacity: 1; }
  .card .desc { font-size: 13px; color: var(--text-dim); margin: 0; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; padding-top: 3px; }
  .card .tags .chip { padding: 2px 9px; font-size: 11.5px; background: transparent; }

  /* ── Archive ───────────────────────────────────────────────── */
  .archive { margin: 8px 0 30px; border: 1px dashed var(--border-strong); border-radius: var(--r-lg); background: var(--surface); }
  .archive > summary { cursor: pointer; padding: 15px 17px; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px; list-style: none; color: var(--text-dim); }
  .archive > summary::-webkit-details-marker { display: none; }
  .archive > summary .chev { margin-left: auto; transition: transform var(--t); }
  .archive[open] > summary .chev { transform: rotate(90deg); }
  .archive .abody { padding: 0 17px 17px; display: grid; gap: 10px; }
  .arc-item { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-2); }
  .arc-item .nm { font-weight: 700; color: var(--text-dim); text-decoration: line-through; }
  .arc-item .reason { font-size: 13px; color: var(--text-faint); margin: 3px 0 8px; }
  .arc-item .links { display: flex; flex-wrap: wrap; gap: 8px; }
  .arc-item .links a { background: var(--accent); color: var(--accent-contrast); padding: 3px 11px; border-radius: var(--r-full); font-size: 12.5px; font-weight: 600; }
  .arc-item .links a:hover { opacity: .9; }

  .empty { text-align: center; color: var(--text-dim); padding: 80px 0; }
  .empty .big { font-size: 40px; margin-bottom: 12px; }
  mark { background: hsl(var(--h, 48) 90% 60% / .32); color: inherit; padding: 0 2px; border-radius: 3px; }
  .pagefoot { color: var(--text-faint); font-size: 12.5px; border-top: 1px solid var(--border); padding-top: 18px; margin-top: 10px; }

  .to-top { position: fixed; right: 22px; bottom: 22px; z-index: 70; width: 44px; height: 44px; border-radius: var(--r-full);
    background: var(--accent); color: var(--accent-contrast); border: 0; cursor: pointer; box-shadow: var(--shadow-lg);
    display: grid; place-items: center; opacity: 0; transform: translateY(12px); pointer-events: none; transition: all var(--t) var(--ease); }
  .to-top.show { opacity: 1; transform: none; pointer-events: auto; }
  .to-top svg { width: 20px; height: 20px; }

  .scrim { display: none; }

  /* ── Mobile ────────────────────────────────────────────────── */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; top: 0; left: 0; width: 280px; transform: translateX(-100%);
      transition: transform var(--t) var(--ease); box-shadow: var(--shadow-lg); }
    body.nav-open .sidebar { transform: none; }
    .scrim { display: block; position: fixed; inset: 0; background: #0009; z-index: 55; opacity: 0; pointer-events: none; transition: opacity var(--t); }
    body.nav-open .scrim { opacity: 1; pointer-events: auto; }
    .menu-btn { display: grid; place-items: center; width: 40px; height: 40px; flex-shrink: 0; border-radius: var(--r-md);
      background: var(--surface); border: 1px solid var(--border-strong); color: var(--text-dim); cursor: pointer; }
    .menu-btn svg { width: 20px; height: 20px; }
  }
</style>
</head>
<body>
  <script src="data/shelf.js"></script>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 6 4 14M12 6v14M8 8v12M4 4v16"/></svg></span>
        <span>Awesome Shelf</span>
      </div>
      <div class="nav-title">컬렉션</div>
      <nav class="navlist" id="navlist" aria-label="섹션"></nav>
      <div class="side-foot">
        <a id="repoLink" href="https://github.com/joongi007/awesome-shelf" target="_blank" rel="noopener" title="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.74c0 .27.16.57.67.48A10 10 0 0 0 22 12 10 10 0 0 0 12 2z"/></svg>
          저장소
        </a>
        <button id="themeBtn" aria-label="테마 전환" title="테마 전환"></button>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="메뉴">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="search" id="searchWrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="search" type="search" placeholder="검색 — 이름 · 설명 · 태그" autocomplete="off" aria-label="검색" />
          <span class="kbd"><kbd>/</kbd></span>
          <button class="x" id="searchClear" aria-label="지우기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </header>

      <div class="content">
        <section class="hero">
          <h1 id="title">Awesome Shelf</h1>
          <p id="intro"></p>
          <div class="stats" id="stats"></div>
        </section>

        <details class="filter" id="filter">
          <summary>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M10 18h4"/></svg>
            태그로 거르기 <span id="filterHint" style="color:var(--text-faint);font-weight:500"></span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </summary>
          <div class="body" id="taglist"></div>
        </details>

        <div class="toolbar">
          <span class="count" id="count"></span>
          <button class="btn-ghost" id="clearBtn" hidden>필터 초기화</button>
          <span class="active-tags" id="activeTags"></span>
        </div>

        <div id="contentList"></div>
        <div id="archiveMount"></div>
        <div class="pagefoot" id="pagefoot"></div>
      </div>
    </div>
  </div>

  <button class="to-top" id="toTop" aria-label="맨 위로">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 7-7 7 7M12 5v14"/></svg>
  </button>

<script>
"use strict";
const D = window.SHELF_DATA;
const $ = (s) => document.querySelector(s);
const state = { q: "", tags: new Set() };

/* ── Section icons (Lucide) — 이모지 대신 깔끔한 라인 아이콘 ── */
const SVG = (p) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p}</svg>`;
const ICONS = {
  "awesome-list": SVG('<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>'),
  "open-source":  SVG('<path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/>'),
  "ai-service":   SVG('<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/>'),
  "ai-project":   SVG('<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9"/><path d="M15 2v2M9 2v2M15 20v2M9 20v2M2 15h2M2 9h2M20 15h2M20 9h2"/>'),
  "prompt":       SVG('<path d="m4 17 6-6-6-6M12 19h8"/>'),
  "security":     SVG('<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>'),
  "article":      SVG('<path d="M12 7v14M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>'),
  "misc":         SVG('<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>'),
};
const iconFor = (k) => ICONS[k] || SVG('<circle cx="12" cy="12" r="9"/>');

/* ── Theme ─────────────────────────────────────────────────── */
const THEMES = ["auto", "light", "dark"];
const TICON = {
  auto:  SVG('<rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8M12 17v4"/>'),
  light: SVG('<circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4 12H1M23 12h-3M5.6 5.6 3.5 3.5M20.5 20.5l-2.1-2.1M5.6 18.4l-2.1 2.1M20.5 3.5l-2.1 2.1"/>'),
  dark:  SVG('<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'),
};
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  $("#themeBtn").innerHTML = TICON[t];
  $("#themeBtn").title = "테마: " + t;
  try { localStorage.setItem("shelf-theme", t); } catch (e) {}
}
(function () { let t = "auto"; try { t = localStorage.getItem("shelf-theme") || "auto"; } catch (e) {} applyTheme(THEMES.includes(t) ? t : "auto"); })();
$("#themeBtn").addEventListener("click", () => applyTheme(THEMES[(THEMES.indexOf(document.documentElement.dataset.theme) + 1) % 3]));

/* ── Helpers ───────────────────────────────────────────────── */
const allEntries = () => D.sections.flatMap((s) => s.entries);
const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
function hl(html) {
  for (const t of state.q.toLowerCase().split(/\s+/).filter(Boolean)) {
    const safe = t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    html = html.replace(new RegExp(`(${safe})(?![^<]*>)`, "gi"), "<mark>$1</mark>");
  }
  return html;
}
function renderDesc(d) {
  let out = "", last = 0, m; const re = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
  while ((m = re.exec(d))) { out += hl(esc(d.slice(last, m.index))); out += `<a href="${esc(m[2])}" target="_blank" rel="noopener">${hl(esc(m[1]))}</a>`; last = re.lastIndex; }
  return out + hl(esc(d.slice(last)));
}
function tagCounts() {
  const c = new Map();
  for (const e of allEntries()) for (const t of e.tags || []) c.set(t, (c.get(t) || 0) + 1);
  return [...c.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
}
function matches(e) {
  for (const t of state.tags) if (!(e.tags || []).includes(t)) return false;
  if (state.q) { const hay = (e.name + " " + e.desc + " " + (e.tags || []).join(" ")).toLowerCase();
    for (const term of state.q.toLowerCase().split(/\s+/).filter(Boolean)) if (!hay.includes(term)) return false; }
  return true;
}

/* ── Card avatar / favicon ─────────────────────────────────── */
function avatarFor(url) {
  try {
    const u = new URL(url);
    if (u.hostname === "github.com") {
      const owner = u.pathname.split("/").filter(Boolean)[0];
      if (owner) return `https://github.com/${owner}.png?size=80`;
    }
    if (u.hostname) return `https://icons.duckduckgo.com/ip3/${u.hostname}.ico`;
  } catch (e) {}
  return "";
}
function monogram(name) {
  const m = (name || "?").replace(/^.*\//, "").match(/[A-Za-z0-9가-힣]/);
  return m ? m[0] : "#";
}
function renderName(name) {
  const i = name.indexOf("/");
  if (i > 0 && i < name.length - 1)
    return `<span class="owner">${hl(esc(name.slice(0, i + 1)))}</span>${hl(esc(name.slice(i + 1)))}`;
  return hl(esc(name));
}

/* ── URL hash (shareable) ──────────────────────────────────── */
function readHash() {
  const h = new URLSearchParams(location.hash.slice(1));
  state.q = h.get("q") || ""; state.tags = new Set((h.get("tags") || "").split(",").filter(Boolean));
  $("#search").value = state.q; $("#searchWrap").classList.toggle("has-value", !!state.q);
}
function writeHash() {
  const h = new URLSearchParams();
  if (state.q) h.set("q", state.q);
  if (state.tags.size) h.set("tags", [...state.tags].join(","));
  history.replaceState(null, "", h.toString() ? "#" + h.toString() : location.pathname + location.search);
}

/* ── Static UI ─────────────────────────────────────────────── */
function buildStatic() {
  const plain = (D.title || "Awesome Shelf").replace(/^[\s\p{Extended_Pictographic}️]+/u, "").trim() || "Awesome Shelf";
  $("#title").textContent = plain; document.title = plain; $("#intro").textContent = D.intro || "";
  const total = allEntries().length, tags = tagCounts();
  $("#stats").innerHTML =
    `<span class="stat"><b>${total}</b> 항목</span><span class="stat"><b>${D.sections.length}</b> 섹션</span><span class="stat"><b>${tags.length}</b> 태그</span>` +
    (D.archived?.length ? `<span class="stat">보관 <b>${D.archived.length}</b></span>` : "");
  $("#pagefoot").innerHTML = `${total}개 항목 · <code>data/shelf.json</code> 수정 후 <code>py build.py</code>`;
  $("#filterHint").textContent = `· 전체 ${tags.length}개 · 여러 개 선택 시 모두 포함(AND)`;

  $("#navlist").innerHTML = D.sections.map((s) =>
    `<button class="navrow sec-${s.key}" data-sec="${s.key}"><span class="ic">${iconFor(s.key)}</span><span class="nm">${esc(s.title)}</span><span class="ct">${s.entries.length}</span></button>`).join("");
  $("#navlist").querySelectorAll(".navrow").forEach((b) => b.addEventListener("click", () => {
    document.getElementById("sec-" + b.dataset.sec)?.scrollIntoView({ behavior: "smooth", block: "start" });
    document.body.classList.remove("nav-open");
  }));

  $("#taglist").innerHTML = tags.map(([t, c]) => `<button class="chip" data-tag="${t}">#${t}<span class="cnt">${c}</span></button>`).join("");
  $("#taglist").querySelectorAll(".chip").forEach((c) => c.addEventListener("click", () => toggleTag(c.dataset.tag)));
  buildArchive();
}
function buildArchive() {
  const arc = D.archived || []; if (!arc.length) return;
  const items = arc.map((e) => {
    const links = (e.links || []).map((l) => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join("");
    return `<div class="arc-item"><div class="nm">${esc(e.name)}</div><div class="reason">${esc(e.reason || "")}</div><div class="links">${links}</div></div>`;
  }).join("");
  $("#archiveMount").innerHTML =
    `<details class="archive"><summary>🗄️ 보관함 <span style="color:var(--text-faint);font-weight:500">· 사라진 링크 ${arc.length}개 (이전처·미러)</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m9 18 6-6-6-6"/></svg></summary><div class="abody">${items}</div></details>`;
}

/* ── Filter / render ───────────────────────────────────────── */
function toggleTag(t) { state.tags.has(t) ? state.tags.delete(t) : state.tags.add(t); writeHash(); render(); }

function render() {
  const root = $("#contentList"); root.innerHTML = ""; let shown = 0;
  for (const s of D.sections) {
    const entries = s.entries.filter(matches);
    if (!entries.length) continue; shown += entries.length;
    const sec = document.createElement("section");
    sec.className = "group sec-" + s.key; sec.id = "sec-" + s.key;
    sec.innerHTML =
      `<div class="group-head"><span class="ic">${iconFor(s.key)}</span><h2>${esc(s.title)}</h2><span class="badge">${entries.length}</span></div>
       <div class="cards">` + entries.map((e) => {
        const tags = (e.tags || []).map((t) => `<button class="chip ${state.tags.has(t) ? "active" : ""}" data-tag="${t}">#${t}</button>`).join("");
        const av = avatarFor(e.url);
        const avatar = `<span class="avatar"><b>${esc(monogram(e.name))}</b>${av ? `<img loading="lazy" src="${esc(av)}" alt="" referrerpolicy="no-referrer" onerror="this.remove()">` : ""}</span>`;
        return `<article class="card">
          <div class="chead">${avatar}
            <div class="ctitle"><a href="${esc(e.url)}" target="_blank" rel="noopener">${renderName(e.name)}</a>
              <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg></div></div>
          ${e.desc ? `<p class="desc" title="${esc(e.desc)}">${renderDesc(e.desc)}</p>` : ""}
          ${tags ? `<div class="tags">${tags}</div>` : ""}</article>`;
      }).join("") + `</div>`;
    root.appendChild(sec);
  }
  if (!shown) root.innerHTML = `<div class="empty"><div class="big">🔍</div>조건에 맞는 항목이 없어요.<br>검색어나 태그를 바꿔보세요.</div>`;
  root.querySelectorAll(".card .chip").forEach((c) => c.addEventListener("click", () => toggleTag(c.dataset.tag)));

  $("#count").innerHTML = `<b>${shown}</b>개 표시 중`;
  $("#clearBtn").hidden = !(state.q || state.tags.size);
  $("#activeTags").innerHTML = [...state.tags].map((t) => `<button class="chip active" data-tag="${t}">#${t} ✕</button>`).join("");
  $("#activeTags").querySelectorAll(".chip").forEach((c) => c.addEventListener("click", () => toggleTag(c.dataset.tag)));
  document.querySelectorAll("#taglist .chip").forEach((c) => c.classList.toggle("active", state.tags.has(c.dataset.tag)));
  observeSections();
}

let spy;
function observeSections() {
  spy?.disconnect();
  spy = new IntersectionObserver((ents) => {
    for (const e of ents) if (e.isIntersecting) {
      const k = e.target.id.replace("sec-", "");
      document.querySelectorAll(".navrow").forEach((p) => p.classList.toggle("active", p.dataset.sec === k));
    }
  }, { rootMargin: "-90px 0px -75% 0px" });
  document.querySelectorAll(".group").forEach((g) => spy.observe(g));
}

/* ── Events ────────────────────────────────────────────────── */
let deb;
$("#search").addEventListener("input", (e) => {
  state.q = e.target.value; $("#searchWrap").classList.toggle("has-value", !!state.q);
  clearTimeout(deb); deb = setTimeout(() => { writeHash(); render(); }, 110);
});
$("#searchClear").addEventListener("click", () => { state.q = ""; $("#search").value = ""; $("#searchWrap").classList.remove("has-value"); writeHash(); render(); $("#search").focus(); });
$("#clearBtn").addEventListener("click", () => { state.q = ""; state.tags.clear(); $("#search").value = ""; $("#searchWrap").classList.remove("has-value"); writeHash(); render(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "/" && document.activeElement !== $("#search")) { e.preventDefault(); $("#search").focus(); }
  if (e.key === "Escape") { if (document.activeElement === $("#search")) $("#searchClear").click(); document.body.classList.remove("nav-open"); }
});
$("#menuBtn").addEventListener("click", () => document.body.classList.toggle("nav-open"));
$("#scrim").addEventListener("click", () => document.body.classList.remove("nav-open"));
const toTop = $("#toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
(function () { const m = location.hostname.match(/^([^.]+)\.github\.io$/); if (m) $("#repoLink").href = `https://github.com/${m[1]}/${location.pathname.split("/").filter(Boolean)[0] || ""}`; })();

/* ── Boot ──────────────────────────────────────────────────── */
if (!D) {
  $("#contentList").innerHTML = `<div class="empty"><div class="big">⚠️</div>데이터(data/shelf.js)를 불러오지 못했어요.<br><code>py build.py</code>를 실행했는지 확인하세요.</div>`;
} else {
  buildStatic(); readHash(); render();
  addEventListener("hashchange", () => { readHash(); render(); });
}
</script>
</body>
</html>
